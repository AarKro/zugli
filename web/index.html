<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zügli</title>
<!--
  Phase 2 configuration page (PROJECT_BRIEF.md §4). Served by the ESP32 over HTTP at
  http://zugli.local (or the device IP). Self-contained: all CSS/JS inline. The only
  network calls are HTTPS requests straight from this page to transport.opendata.ch
  (CORS-enabled, no key) plus one same-origin POST /save to the device.

  Font note (brief §8-7): production should embed an Archivo subset as a base64
  @font-face so the page renders even with no internet for font CDNs. For now we load
  Archivo from Google Fonts with a system-font fallback; swap in the base64 face before
  shipping offline units.  TODO(offline-font)
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#191919; --surface:#0E0C0A; --accent:#B87648;
    --selected:#2C2213; --cream:#F5EFE6; --muted:#5C554C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--cream);
    font-family:'Archivo',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:16px; line-height:1.4;
    -webkit-font-smoothing:antialiased;
    padding:calc(32px + env(safe-area-inset-top)) 20px 64px;
  }
  .wrap{max-width:440px;margin:0 auto;}
  h1{color:var(--accent);font-weight:700;font-size:30px;margin:0 0 28px;letter-spacing:.5px;}
  h2{color:var(--cream);font-weight:500;font-size:19px;margin:28px 0 12px;}
  /* Full-width tracking-mode switch, directly under the title. Two equal segments; the active
     one is highlighted like a selected connection. */
  .mode{display:flex;gap:6px;background:var(--surface);border-radius:14px;padding:6px;margin:0 0 4px;}
  .mode-opt{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:transparent;color:var(--muted);border:none;border-radius:10px;
    padding:11px 8px;font-family:inherit;cursor:pointer;min-height:44px;
    text-align:center;line-height:1.15;
  }
  .mode-opt .mt{font-size:15px;font-weight:600;}
  .mode-opt .ms{font-size:11px;}
  .mode-opt.active{background:var(--selected);}
  .mode-opt.active .mt{color:var(--accent);}
  .mode-opt.active .ms{color:var(--cream);}
  .field{
    width:100%;background:var(--cream);color:#1a1410;border:none;border-radius:12px;
    padding:14px 16px;font-size:16px;font-family:inherit;outline:none;
  }
  .field::placeholder{color:var(--muted);}
  .search-wrap{position:relative;}
  .dropdown{
    position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:5;
    background:var(--cream);border-radius:12px;overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
  }
  .dropdown .row{padding:13px 16px;color:#1a1410;cursor:pointer;border-top:1px solid #e0d8cc;}
  .dropdown .row:first-child{border-top:none;}
  .dropdown .row:active{background:#ece3d6;}
  .hidden{display:none !important;}
  .muted{color:var(--muted);}
  .conn{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border:2px solid transparent;border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;
  }
  .conn.selected{border-color:var(--accent);background:var(--selected);}
  .badge{
    flex:none;min-width:34px;padding:3px 9px;border-radius:7px;text-align:center;
    font-weight:600;font-size:15px;
  }
  .badge.filled{background:var(--accent);color:var(--surface);}
  .badge.outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);}
  .conn .dest{color:var(--cream);font-size:16px;}
  .conn .arrow{color:var(--muted);}
  .btn{
    width:100%;background:var(--accent);color:var(--surface);border:none;border-radius:12px;
    padding:16px;font-size:19px;font-weight:600;font-family:inherit;margin-top:24px;cursor:pointer;
    min-height:44px;
  }
  .btn[disabled]{opacity:.6;cursor:default;}
  .note{margin-top:14px;font-size:15px;}
  .note.err{color:#e08a5a;}
  .note.ok{color:var(--accent);}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(14,12,10,.4);
    border-top-color:var(--surface);border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:8px;}
  @keyframes s{to{transform:rotate(360deg);}}

  /* settings cogwheel + mobile bottom-sheet */
  .gear{
    /* Stays put on scroll, but at the top it lines up with the <h1> title: the title's line
       box is 30px×1.4 ≈ 42px tall starting at the body's top padding, so a 44px button anchored
       1px above that padding is vertically centred on it. Right edge matches the 20px body inset. */
    position:fixed;top:calc(31px + env(safe-area-inset-top));right:20px;z-index:20;
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    background:var(--surface);color:var(--accent);border:none;border-radius:12px;cursor:pointer;
  }
  .gear:active{background:#1a1510;}
  .gear svg{display:block;width:24px;height:24px;fill:currentColor;}
  .overlay{
    position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.55);
    display:flex;align-items:flex-end;justify-content:center;
  }
  .sheet{
    width:100%;max-width:440px;background:var(--bg);
    border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.5);
    padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    animation:sheet-up .22s ease-out;
  }
  @keyframes sheet-up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .sheet-head h2{margin:0;font-size:20px;color:var(--cream);}
  .sheet-close{background:none;border:none;color:var(--muted);font-size:24px;line-height:1;cursor:pointer;padding:4px 6px;}
  .opt{display:flex;align-items:center;gap:16px;padding:14px 0;}
  .opt-text{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .opt-title{font-size:16px;color:var(--cream);}
  .opt-sub{font-size:13px;}
  .switch{position:relative;display:inline-block;width:48px;height:28px;flex:none;margin-left:auto;}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;}
  .slider{position:absolute;inset:0;background:#3a322a;border-radius:999px;transition:.2s;pointer-events:none;}
  .slider::before{content:"";position:absolute;height:22px;width:22px;left:3px;top:3px;
    background:var(--cream);border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--accent);}
  .switch input:checked + .slider::before{transform:translateX(20px);}
  .opt-col{flex-direction:column;align-items:stretch;gap:10px;}
  .opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .opt-val{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}
  .range{width:100%;accent-color:var(--accent);height:28px;margin:0;}
  .time-row{display:flex;align-items:center;gap:10px;}
  .time{
    flex:1;background:var(--cream);color:#1a1410;border:none;border-radius:10px;
    padding:11px 12px;font-family:inherit;font-size:16px;
  }
  .opt + .opt{border-top:1px solid #241d16;}
</style>
</head>
<body>
<button id="gear" class="gear" aria-label="Settings" aria-haspopup="dialog">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94a7.49 7.49 0 0 0 .05-.94 7.49 7.49 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.78 8.8a.5.5 0 0 0 .12.64l2.03 1.58a7.49 7.49 0 0 0 0 1.88L2.9 14.48a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96a7 7 0 0 0 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/></svg>
</button>

<div id="settings" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="settings-title">Settings</h2>
      <button id="settings-close" class="sheet-close" aria-label="Close">&times;</button>
    </div>
    <label class="opt" for="opt-stripcity">
      <span class="opt-text">
        <span class="opt-title">Hide city names</span>
        <span class="opt-sub muted">Show only the stop, e.g. “Schlieren” instead of “Zürich, Schlieren”.</span>
      </span>
      <span class="switch">
        <input type="checkbox" id="opt-stripcity">
        <span class="slider"></span>
      </span>
    </label>

    <div class="opt opt-col">
      <div class="opt-row">
        <span class="opt-title">Brightness</span>
        <span class="opt-val" id="bright-val">60%</span>
      </div>
      <input type="range" class="range" id="opt-brightness" min="1" max="10" step="1" value="6" aria-label="Brightness">
    </div>

    <label class="opt" for="opt-auto">
      <span class="opt-text">
        <span class="opt-title">Auto-dim at night</span>
        <span class="opt-sub muted">Drop to 10% during the time window below.</span>
      </span>
      <span class="switch">
        <input type="checkbox" id="opt-auto">
        <span class="slider"></span>
      </span>
    </label>

    <div class="opt opt-col" id="reduced-window">
      <span class="opt-title">Dim from</span>
      <div class="time-row">
        <input type="time" class="time" id="opt-start" value="20:00" aria-label="Dim from">
        <span class="muted">to</span>
        <input type="time" class="time" id="opt-end" value="08:00" aria-label="Dim until">
      </div>
    </div>

    <p class="note hidden" id="settings-status"></p>
  </div>
</div>

<div class="wrap">
  <h1>Zügli</h1>

  <!-- Tracking mode: pick specific connections, or show the whole stop. Spans the full width. -->
  <div class="mode" role="tablist" aria-label="What Zügli tracks">
    <button class="mode-opt active" id="mode-specific" role="tab" aria-selected="true">
      <span class="mt">Specific connections</span>
      <span class="ms">Pick the lines to track</span>
    </button>
    <button class="mode-opt" id="mode-all" role="tab" aria-selected="false">
      <span class="mt">All connections</span>
      <span class="ms">Everything at the stop</span>
    </button>
  </div>

  <!-- State 1/2: stop search + autocomplete -->
  <h2>Where should Zügli look?</h2>
  <div class="search-wrap">
    <input class="field" id="stop" type="text" placeholder="Search a stop…" autocomplete="off" spellcheck="false">
    <div class="dropdown hidden" id="results"></div>
  </div>

  <!-- Connection list — multi-select in specific-connections mode, hidden for all-connections. -->
  <div id="conn-section" class="hidden">
    <h2>Which connections?</h2>
    <p class="note muted" id="conn-hint">Tap the lines you want — up to 6.</p>
    <div id="conns"></div>
    <p class="note muted hidden" id="conn-empty">No live connections at this stop right now.</p>
  </div>

  <!-- Save: shown once there's something to save (≥1 picked connection, or a stop in
       all-connections mode). The panel renders the live board, so there's no preview. -->
  <div id="save-section" class="hidden">
    <button class="btn" id="save">Save to Zügli</button>
    <p class="note hidden" id="status"></p>
  </div>
</div>

<script>
"use strict";
const API = "https://transport.opendata.ch/v1";
const $ = (id) => document.getElementById(id);

const MAX_CONNS = 6;         // mirrors firmware `model::MAX_CONNS`
let selectedStop = null;     // {id, name}
let selectedConns = [];      // [{line, category, destination}] — the picked connections
let allConnections = false;  // tracking mode: false = specific connections, true = whole stop

// ---------- tracking-mode switch (specific connections vs. all connections) ----------
function setMode(all){
  if (all === allConnections) return;
  allConnections = all;
  $("mode-specific").classList.toggle("active", !all);
  $("mode-all").classList.toggle("active", all);
  $("mode-specific").setAttribute("aria-selected", String(!all));
  $("mode-all").setAttribute("aria-selected", String(all));
  if (all){
    // Whole stop: no per-line choice — jump straight to the save button once a stop is picked.
    $("conn-section").classList.add("hidden");
    selectedConns = [];
    if (selectedStop) showSave(); else $("save-section").classList.add("hidden");
  } else {
    // Specific connections: re-open the multi-select list for the chosen stop.
    $("save-section").classList.add("hidden");
    if (selectedStop) loadConnections(selectedStop.id);
  }
}
// Reveal the save button ready for a fresh save (no lock-in behind a previous "Saved ✓").
function showSave(){
  $("save-section").classList.remove("hidden");
  $("status").classList.add("hidden");
  const btn = $("save");
  btn.disabled = false;
  btn.textContent = "Save to Zügli";
}
// In specific mode the save button only appears once at least one connection is picked. A no-op
// in all-connections mode, so a late-resolving connection fetch can't hide its save button.
function updateSpecificSave(){
  if (allConnections) return;
  if (selectedConns.length) showSave();
  else $("save-section").classList.add("hidden");
}
$("mode-specific").addEventListener("click", () => setMode(false));
$("mode-all").addEventListener("click", () => setMode(true));

// ---------- stop autocomplete (phone → API directly, brief §6.1) ----------
let debounce;
$("stop").addEventListener("input", (e) => {
  const q = e.target.value.trim();
  selectedStop = null; resetConnections();
  clearTimeout(debounce);
  if (q.length < 2) { hideResults(); return; }
  debounce = setTimeout(() => searchStops(q), 250);
});

async function searchStops(q){
  try {
    const r = await fetch(`${API}/locations?query=${encodeURIComponent(q)}&type=station`);
    const data = await r.json();
    const stations = (data.stations || []).filter(s => s.id && s.name);
    renderResults(stations);
  } catch (_) { hideResults(); }
}

function renderResults(stations){
  const box = $("results");
  if (!stations.length){ hideResults(); return; }
  box.innerHTML = "";
  stations.slice(0, 8).forEach(s => {
    const row = document.createElement("div");
    row.className = "row";
    row.textContent = s.name;
    row.onclick = () => chooseStop(s);
    box.appendChild(row);
  });
  box.classList.remove("hidden");
}
function hideResults(){ $("results").classList.add("hidden"); }

function chooseStop(s){
  selectedStop = { id: String(s.id), name: s.name };
  $("stop").value = s.name;
  hideResults();
  // All-connections mode skips the per-line list and offers the save button directly.
  if (allConnections) showSave();
  else loadConnections(s.id);
}

// ---------- connection list (brief §6.2: stationboard, dedupe by number+to) ----------
async function loadConnections(stopId){
  const sec = $("conn-section");
  sec.classList.remove("hidden");
  $("conns").innerHTML = `<p class="note muted">Loading connections…</p>`;
  $("conn-empty").classList.add("hidden");
  try {
    const r = await fetch(`${API}/stationboard?id=${encodeURIComponent(stopId)}&limit=20`);
    const data = await r.json();
    const board = data.stationboard || [];
    const seen = new Set();
    const conns = [];
    for (const e of board){
      const line = e.number ?? e.name ?? "";
      const dest = e.to ?? "";
      const key = line + "→" + dest;
      if (!line || !dest || seen.has(key)) continue;
      seen.add(key);
      conns.push({ line, category: e.category || "", destination: dest });
    }
    renderConnections(conns);
  } catch (_) {
    $("conns").innerHTML = `<p class="note err">Couldn't load connections — try again.</p>`;
  }
}

// Rail = outlined badge, tram/bus = filled (brief §4.2).
function isRail(cat){
  const c = (cat || "").toUpperCase();
  return !(c === "T" || c === "B" || c === "NFT" || c === "NFB" || c === "TROLLEY");
}

// Stable key for a connection (line + destination), used to track which rows are picked.
function connKey(c){ return c.line + "→" + c.destination; }

function renderConnections(conns){
  if (allConnections) return; // mode switched while this stop's board was loading — ignore it
  const box = $("conns");
  box.innerHTML = "";
  selectedConns = [];
  updateSpecificSave();
  if (!conns.length){ $("conn-empty").classList.remove("hidden"); return; }
  $("conn-empty").classList.add("hidden");
  conns.forEach(c => {
    const row = document.createElement("div");
    row.className = "conn";
    const badge = document.createElement("span");
    badge.className = "badge " + (isRail(c.category) ? "outline" : "filled");
    badge.textContent = c.line;
    const arrow = document.createElement("span"); arrow.className = "arrow"; arrow.textContent = "→";
    const dest = document.createElement("span"); dest.className = "dest"; dest.textContent = c.destination;
    row.append(badge, arrow, dest);
    row.onclick = () => toggleConnection(c, row);
    box.appendChild(row);
  });
}

function resetConnections(){
  $("conn-section").classList.add("hidden");
  $("save-section").classList.add("hidden");
  selectedConns = [];
}

// ---------- multi-select connections (specific-connections mode) ----------
// Tap toggles a connection on/off, up to MAX_CONNS. The save button appears once any are picked.
function toggleConnection(c, row){
  const key = connKey(c);
  const i = selectedConns.findIndex(x => connKey(x) === key);
  if (i >= 0){
    selectedConns.splice(i, 1);
    row.classList.remove("selected");
  } else {
    if (selectedConns.length >= MAX_CONNS) return; // at the cap — ignore further picks
    selectedConns.push({ line: c.line, category: c.category, destination: c.destination });
    row.classList.add("selected");
  }
  $("status").classList.add("hidden");
  updateSpecificSave();
}

// ---------- save (POST /save to the device, brief §4.3/§4.4) ----------
$("save").addEventListener("click", async () => {
  if (!selectedStop) return;
  if (!allConnections && !selectedConns.length) return;
  const btn = $("save"), st = $("status");
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span>Saving…`;
  st.className = "note hidden";
  const body = {
    stopId: selectedStop.id,
    stopName: selectedStop.name,
    allConnections,
    connections: allConnections ? [] : selectedConns.map(c => ({
      line: c.line, category: c.category, destination: c.destination,
    })),
  };
  // Abort a stalled request so the button can never get stuck showing "Saving…".
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch("/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
    if (!r.ok) throw new Error("bad status");
    st.textContent = "Saved — Zügli is updating.";
    st.className = "note ok";
  } catch (_) {
    st.textContent = "Couldn't reach Zügli — try again.";
    st.className = "note err";
  } finally {
    // Always restore the resting label and re-enable, whatever happened above, so the
    // button reverts from "Saving…" to "Save to Zügli" and a fresh save is ready (no
    // lock-in). The status line communicates the outcome.
    clearTimeout(timer);
    btn.disabled = false;
    btn.textContent = "Save to Zügli";
  }
});

// ---------- settings sheet (board config: GET/POST /config) ----------
const sheet = $("settings"), setStatus = $("settings-status");
const stripToggle = $("opt-stripcity"), brightRange = $("opt-brightness"), brightVal = $("bright-val"),
      autoToggle = $("opt-auto"), startTime = $("opt-start"), endTime = $("opt-end"), reducedWindow = $("reduced-window");
let configLoaded = false;
// The board's current settings; controls mirror this and every change posts the whole object.
let cfg = { stripCity:false, brightness:6, autoBrightness:true, reducedStart:1200, reducedEnd:480 };

const toMin = (hhmm) => { const [h,m] = hhmm.split(":").map(Number); return h*60 + m; };
const toHHMM = (min) => `${String(Math.floor(min/60)).padStart(2,"0")}:${String(min%60).padStart(2,"0")}`;

function renderConfig(){
  stripToggle.checked = !!cfg.stripCity;
  brightRange.value = cfg.brightness;
  brightVal.textContent = (cfg.brightness * 10) + "%";
  autoToggle.checked = !!cfg.autoBrightness;
  startTime.value = toHHMM(cfg.reducedStart);
  endTime.value = toHHMM(cfg.reducedEnd);
  reducedWindow.classList.toggle("hidden", !cfg.autoBrightness); // time window only matters when auto-dim is on
}

function openSettings(){
  sheet.classList.remove("hidden");
  setStatus.className = "note hidden";
  if (configLoaded) return;
  // Pre-fill from the board's current settings; keep the defaults if it can't be reached.
  fetch("/config")
    .then(r => r.json())
    .then(c => { cfg = { ...cfg, ...c }; configLoaded = true; renderConfig(); })
    .catch(() => {});
}
function closeSettings(){ sheet.classList.add("hidden"); }

$("gear").addEventListener("click", openSettings);
$("settings-close").addEventListener("click", closeSettings);
// Tap the dim backdrop (outside the sheet) to dismiss.
sheet.addEventListener("click", (e) => { if (e.target === sheet) closeSettings(); });

// Apply a control change: snapshot, mutate, push the whole config, and revert the UI on failure.
async function applyChange(mutate){
  const prev = { ...cfg };
  mutate();
  renderConfig();
  setStatus.className = "note hidden";
  try {
    const r = await fetch("/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg),
    });
    if (!r.ok) throw new Error("bad status");
    setStatus.textContent = "Saved — Zügli is updating.";
    setStatus.className = "note ok";
  } catch (_) {
    cfg = prev; renderConfig();
    setStatus.textContent = "Couldn't reach Zügli — try again.";
    setStatus.className = "note err";
  }
}

stripToggle.addEventListener("change", () => applyChange(() => { cfg.stripCity = stripToggle.checked; }));
autoToggle.addEventListener("change", () => applyChange(() => { cfg.autoBrightness = autoToggle.checked; }));
// Live-update the % label while sliding; persist once the user lets go.
brightRange.addEventListener("input", () => { brightVal.textContent = (brightRange.value * 10) + "%"; });
brightRange.addEventListener("change", () => applyChange(() => { cfg.brightness = +brightRange.value; }));
startTime.addEventListener("change", () => { if (startTime.value) applyChange(() => { cfg.reducedStart = toMin(startTime.value); }); });
endTime.addEventListener("change", () => { if (endTime.value) applyChange(() => { cfg.reducedEnd = toMin(endTime.value); }); });

renderConfig(); // reflect defaults until the board's real config loads
</script>
</body>
